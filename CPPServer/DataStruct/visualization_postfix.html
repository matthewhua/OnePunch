<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后缀表达式计算 - 可视化</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        .diagram {
            margin: 30px 0;
        }
        svg {
            width: 100%;
            height: auto;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: #fafafa;
        }
        .description {
            background: #f0f4ff;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            border-left: 4px solid #667eea;
        }
        .step {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .step-title {
            font-weight: bold;
            color: #764ba2;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 后缀表达式计算算法</h1>
        
        <div class="description">
            <h2>算法说明</h2>
            <p>后缀表达式（逆波兰表达式）使用栈来计算，遇到数字入栈，遇到运算符则弹出两个操作数进行计算后将结果入栈。</p>
            <p><strong>示例：</strong> "23+45*-" 表示 (2+3) - (4*5) = 5 - 20 = -15</p>
        </div>

        <div class="diagram">
            <h3>流程图</h3>
            <svg viewBox="0 0 800 900" xmlns="http://www.w3.org/2000/svg">
                <!-- 开始 -->
                <ellipse cx="400" cy="40" rx="60" ry="30" fill="#667eea" stroke="#333" stroke-width="2"/>
                <text x="400" y="48" text-anchor="middle" fill="white" font-size="16" font-weight="bold">开始</text>
                
                <!-- 初始化栈 -->
                <rect x="320" y="100" width="160" height="50" rx="5" fill="#4CAF50" stroke="#333" stroke-width="2"/>
                <text x="400" y="130" text-anchor="middle" fill="white" font-size="14" font-weight="bold">初始化栈</text>
                <line x1="400" y1="70" x2="400" y2="100" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
                
                <!-- 读取字符 -->
                <rect x="320" y="180" width="160" height="50" rx="5" fill="#2196F3" stroke="#333" stroke-width="2"/>
                <text x="400" y="210" text-anchor="middle" fill="white" font-size="14" font-weight="bold">读取下一个字符</text>
                <line x1="400" y1="150" x2="400" y2="180" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
                
                <!-- 判断是否结束 -->
                <path d="M 400 260 L 480 310 L 400 360 L 320 310 Z" fill="#FF9800" stroke="#333" stroke-width="2"/>
                <text x="400" y="318" text-anchor="middle" fill="white" font-size="14" font-weight="bold">字符串</text>
                <text x="400" y="335" text-anchor="middle" fill="white" font-size="14" font-weight="bold">结束?</text>
                <line x1="400" y1="230" x2="400" y2="260" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
                
                <!-- 判断是否为数字 -->
                <path d="M 600 310 L 680 360 L 600 410 L 520 360 Z" fill="#FF9800" stroke="#333" stroke-width="2"/>
                <text x="600" y="368" text-anchor="middle" fill="white" font-size="14" font-weight="bold">是否为</text>
                <text x="600" y="385" text-anchor="middle" fill="white" font-size="14" font-weight="bold">数字?</text>
                <line x1="480" y1="310" x2="520" y2="360" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
                <text x="500" y="330" fill="#333" font-size="12">否</text>
                
                <!-- 数字入栈 -->
                <rect x="520" y="450" width="160" height="50" rx="5" fill="#4CAF50" stroke="#333" stroke-width="2"/>
                <text x="600" y="480" text-anchor="middle" fill="white" font-size="14" font-weight="bold">数字入栈</text>
                <line x1="600" y1="410" x2="600" y2="450" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
                <text x="620" y="430" fill="#333" font-size="12">是</text>
                
                <!-- 运算符处理 -->
                <rect x="120" y="450" width="160" height="80" rx="5" fill="#E91E63" stroke="#333" stroke-width="2"/>
                <text x="200" y="475" text-anchor="middle" fill="white" font-size="13" font-weight="bold">弹出右操作数</text>
                <text x="200" y="495" text-anchor="middle" fill="white" font-size="13" font-weight="bold">弹出左操作数</text>
                <text x="200" y="515" text-anchor="middle" fill="white" font-size="13" font-weight="bold">执行运算</text>
                <line x1="520" y1="360" x2="280" y2="490" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
                <text x="380" y="410" fill="#333" font-size="12">是运算符</text>
                
                <!-- 结果入栈 -->
                <rect x="120" y="560" width="160" height="50" rx="5" fill="#4CAF50" stroke="#333" stroke-width="2"/>
                <text x="200" y="590" text-anchor="middle" fill="white" font-size="14" font-weight="bold">结果入栈</text>
                <line x1="200" y1="530" x2="200" y2="560" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
                
                <!-- 返回读取 -->
                <path d="M 200 610 Q 100 650 100 310 Q 100 200 320 180" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
                <path d="M 600 500 Q 700 550 700 205 Q 700 180 480 180" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
                
                <!-- 弹出结果 -->
                <rect x="320" y="450" width="160" height="50" rx="5" fill="#9C27B0" stroke="#333" stroke-width="2"/>
                <text x="400" y="480" text-anchor="middle" fill="white" font-size="14" font-weight="bold">弹出最终结果</text>
                <line x1="400" y1="360" x2="400" y2="450" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
                <text x="420" y="400" fill="#333" font-size="12">是</text>
                
                <!-- 结束 -->
                <ellipse cx="400" cy="560" rx="60" ry="30" fill="#667eea" stroke="#333" stroke-width="2"/>
                <text x="400" y="568" text-anchor="middle" fill="white" font-size="16" font-weight="bold">结束</text>
                <line x1="400" y1="500" x2="400" y2="530" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
                
                <!-- 箭头定义 -->
                <defs>
                    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
                        <polygon points="0 0, 10 3, 0 6" fill="#333"/>
                    </marker>
                </defs>
            </svg>
        </div>

        <div class="diagram">
            <h3>计算示例：23+45*-</h3>
            <svg viewBox="0 0 1000 400" xmlns="http://www.w3.org/2000/svg">
                <!-- 步骤1 -->
                <g transform="translate(50, 50)">
                    <text x="0" y="0" font-size="14" font-weight="bold">步骤1: 读'2'</text>
                    <rect x="0" y="10" width="60" height="200" fill="none" stroke="#333" stroke-width="2"/>
                    <rect x="5" y="160" width="50" height="40" fill="#4CAF50" stroke="#333" stroke-width="2"/>
                    <text x="30" y="185" text-anchor="middle" font-size="20" font-weight="bold">2</text>
                </g>
                
                <!-- 步骤2 -->
                <g transform="translate(200, 50)">
                    <text x="0" y="0" font-size="14" font-weight="bold">步骤2: 读'3'</text>
                    <rect x="0" y="10" width="60" height="200" fill="none" stroke="#333" stroke-width="2"/>
                    <rect x="5" y="160" width="50" height="40" fill="#4CAF50" stroke="#333" stroke-width="2"/>
                    <text x="30" y="185" text-anchor="middle" font-size="20" font-weight="bold">2</text>
                    <rect x="5" y="115" width="50" height="40" fill="#4CAF50" stroke="#333" stroke-width="2"/>
                    <text x="30" y="140" text-anchor="middle" font-size="20" font-weight="bold">3</text>
                </g>
                
                <!-- 步骤3 -->
                <g transform="translate(350, 50)">
                    <text x="0" y="0" font-size="14" font-weight="bold">步骤3: 读'+'</text>
                    <rect x="0" y="10" width="60" height="200" fill="none" stroke="#333" stroke-width="2"/>
                    <rect x="5" y="160" width="50" height="40" fill="#2196F3" stroke="#333" stroke-width="2"/>
                    <text x="30" y="185" text-anchor="middle" font-size="20" font-weight="bold">5</text>
                    <text x="30" y="240" font-size="12" fill="#E91E63">2+3=5</text>
                </g>
                
                <!-- 步骤4 -->
                <g transform="translate(500, 50)">
                    <text x="0" y="0" font-size="14" font-weight="bold">步骤4: 读'4'</text>
                    <rect x="0" y="10" width="60" height="200" fill="none" stroke="#333" stroke-width="2"/>
                    <rect x="5" y="160" width="50" height="40" fill="#2196F3" stroke="#333" stroke-width="2"/>
                    <text x="30" y="185" text-anchor="middle" font-size="20" font-weight="bold">5</text>
                    <rect x="5" y="115" width="50" height="40" fill="#4CAF50" stroke="#333" stroke-width="2"/>
                    <text x="30" y="140" text-anchor="middle" font-size="20" font-weight="bold">4</text>
                </g>
                
                <!-- 步骤5 -->
                <g transform="translate(650, 50)">
                    <text x="0" y="0" font-size="14" font-weight="bold">步骤5: 读'5'</text>
                    <rect x="0" y="10" width="60" height="200" fill="none" stroke="#333" stroke-width="2"/>
                    <rect x="5" y="160" width="50" height="40" fill="#2196F3" stroke="#333" stroke-width="2"/>
                    <text x="30" y="185" text-anchor="middle" font-size="20" font-weight="bold">5</text>
                    <rect x="5" y="115" width="50" height="40" fill="#4CAF50" stroke="#333" stroke-width="2"/>
                    <text x="30" y="140" text-anchor="middle" font-size="20" font-weight="bold">4</text>
                    <rect x="5" y="70" width="50" height="40" fill="#4CAF50" stroke="#333" stroke-width="2"/>
                    <text x="30" y="95" text-anchor="middle" font-size="20" font-weight="bold">5</text>
                </g>
                
                <!-- 步骤6 -->
                <g transform="translate(800, 50)">
                    <text x="0" y="0" font-size="14" font-weight="bold">步骤6: 读'*'</text>
                    <rect x="0" y="10" width="60" height="200" fill="none" stroke="#333" stroke-width="2"/>
                    <rect x="5" y="160" width="50" height="40" fill="#2196F3" stroke="#333" stroke-width="2"/>
                    <text x="30" y="185" text-anchor="middle" font-size="20" font-weight="bold">5</text>
                    <rect x="5" y="115" width="50" height="40" fill="#FF9800" stroke="#333" stroke-width="2"/>
                    <text x="30" y="140" text-anchor="middle" font-size="18" font-weight="bold">20</text>
                    <text x="30" y="240" font-size="12" fill="#E91E63">4*5=20</text>
                </g>
                
                <!-- 步骤7 -->
                <g transform="translate(150, 300)">
                    <text x="0" y="0" font-size="14" font-weight="bold">步骤7: 读'-'，最终结果</text>
                    <rect x="0" y="10" width="60" height="100" fill="none" stroke="#333" stroke-width="2"/>
                    <rect x="5" y="60" width="50" height="40" fill="#9C27B0" stroke="#333" stroke-width="2"/>
                    <text x="30" y="85" text-anchor="middle" font-size="18" font-weight="bold">-15</text>
                    <text x="30" y="130" font-size="12" fill="#E91E63">5-20=-15</text>
                </g>
            </svg>
        </div>

        <div class="description">
            <h3>算法步骤</h3>
            <div class="step">
                <div class="step-title">1. 初始化</div>
                创建一个空栈用于存储操作数
            </div>
            <div class="step">
                <div class="step-title">2. 扫描表达式</div>
                从左到右逐个读取字符
            </div>
            <div class="step">
                <div class="step-title">3. 处理数字</div>
                如果是数字，将其转换为完整的数值后压入栈中
            </div>
            <div class="step">
                <div class="step-title">4. 处理运算符</div>
                如果是运算符，从栈中弹出两个操作数，执行运算，将结果压回栈中
            </div>
            <div class="step">
                <div class="step-title">5. 返回结果</div>
                表达式扫描完毕后，栈顶元素即为最终结果
            </div>
        </div>
    </div>
</body>
</html>
