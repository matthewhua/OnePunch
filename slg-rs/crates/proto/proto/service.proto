syntax = "proto3";

package slg;

import "Rpc.proto";
import "World.proto";

// 定义 World 服务
service WorldService {
    // 统一入口，模拟 Dubbo/Command 模式的转发
    rpc Call(RpcMsg) returns (RpcMsg);

    // 也可以定义具体业务接口
    rpc JoinMap(JoinMapRequest) returns (JoinMapResponse);
}

message JoinMapRequest {
    int64 role_id = 1;
    int32 map_id = 2;
}

message JoinMapResponse {
    int32 code = 1;
    string msg = 2;
}
