syntax = "proto3";

package slg;

import "Rpc.proto";
import "World.proto";
import "Common.proto";

import "Game.proto";

// 定义 World 服务
service WorldService {
    // 统一入口，模拟 Dubbo/Command 模式的转发
    rpc Call(RpcMsg) returns (RpcMsg);

    // Gateway 转发世界地图/行军/战斗命令
    rpc Dispatch(DispatchRq) returns (DispatchRs);

    // 也可以定义具体业务接口
    rpc JoinMap(JoinMapRequest) returns (JoinMapResponse);
}

// 定义 Home 服务
service HomeService {
    rpc BeginGame(BeginGameRq) returns (BeginGameRs);
    rpc CreateRole(CreateRoleRq) returns (CreateRoleRs);
    rpc RoleLogin(RoleLoginRq) returns (RoleLoginRs);

    // Gateway 转发业务命令到 PlayerActor
    rpc Dispatch(DispatchRq) returns (DispatchRs);

    // World 到达/出站事件投递到在线 PlayerActor
    rpc WorldOutbound(WorldOutboundRq) returns (WorldOutboundRs);

    // 玩家断线通知，触发 PlayerActor 存盘下线
    rpc PlayerOffline(PlayerOfflineRq) returns (PlayerOfflineRs);
}

// ── Dispatch ──────────────────────────────────────────────────────────────────

message DispatchRq {
    int64 role_id = 1;  // 玩家角色ID
    int32 cmd     = 2;  // 业务命令号
    bytes payload = 3;  // 原始 protobuf payload
}

message DispatchRs {
    int32 code    = 1;  // 0=成功，非0=错误码
    bytes payload = 2;  // 响应 protobuf payload
}

// ── WorldOutbound ────────────────────────────────────────────────────────────

message WorldOutboundRq {
    int64 role_id         = 1;  // 目标玩家角色ID
    int32 event_type      = 2;  // World 到达/出站事件类型
    int32 world_entity_id = 3;  // 世界实体/地块/位置ID
    int32 troop_key       = 4;  // 部队唯一ID
    bytes payload         = 5;  // 事件扩展 payload，承载后续细化 protobuf
    string context        = 6;  // 可诊断上下文
    string event_id       = 7;  // 稳定事件ID，用于跨服务幂等
    string event_key      = 8;  // 可读稳定事件键，用于诊断与幂等回退
}

message WorldOutboundRs {
    int32 code = 1;   // 0=成功，非0=错误码
    string msg = 2;   // 可诊断说明
}

message WorldScoutReportRequestedPayload {
    optional int32 origin     = 1;  // 侦查发起坐标
    int32 target_pos          = 2;  // 侦查目标坐标
    optional int32 camp       = 3;  // 发起方阵营
}

message WorldCollectStartedPayload {
    int32 target_pos          = 1;  // 采集目标坐标
    optional int32 march_type = 2;  // 行军类型
    int64 start_time_ms       = 3;  // 开始采集时间
}

message WorldTroopReturnedPayload {
    int32 home_pos            = 1;  // 返回目标坐标
    optional int32 march_type = 2;  // 原行军类型
}

message WorldCollectReturnedPayload {
    int32 target_pos                 = 1;  // 采集目标坐标
    int32 home_pos                   = 2;  // 返回目标坐标
    optional int32 march_type        = 3;  // 原行军类型
    optional int32 formation_id      = 4;  // 出征编队
    repeated AwardPb awards          = 5;  // 采集带回奖励
    int64 collect_start_time_ms      = 6;  // 开始采集时间
    int64 collect_end_time_ms        = 7;  // 完成采集时间
}

message WorldGarrisonChangedPayload {
    int32 target_pos          = 1;  // 驻防目标坐标
    optional int32 camp       = 2;  // 部队阵营
    bool is_arrival           = 3;  // true=到达驻防
}

// ── PlayerOffline ─────────────────────────────────────────────────────────────

message PlayerOfflineRq {
    int64 role_id = 1;  // 玩家角色ID
}

message PlayerOfflineRs {
    int32 code = 1;  // 0=成功
}

message JoinMapRequest {
    int64 role_id = 1;
    int32 map_id = 2;
}

message JoinMapResponse {
    int32 code = 1;
    string msg = 2;
}
