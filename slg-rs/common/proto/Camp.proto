  required int32 cityId = 1;      // 城池id
  required int32 curArm = 2;      // 城池当前兵力
  required int32 maxArm = 3;      // 城池最大兵力
  optional int32 leaveTimeStamp = 4;   //城主撤离结束时间戳
  extend Base {
    optional LeaveCityRs ext = 3074;
  }
