  }
}

// 阵营荣誉战争变化
message SyncCampWarChangeRs {
  optional int32 index = 1; //阵营荣誉战争变化的索引 CampCountType
  optional int32 num = 2;   //变化后的数值
  extend Base {
    optional SyncCampWarChangeRs ext = 3077;
  }
}

// 阵营荣誉战争变化类型
enum CampCountType {
  CAMP_COUNT_TYPE_BUILD = 1;  // 建设次数
  CAMP_COUNT_TYPE_CITY_WAR = 2;  // 城战次数
  CAMP_COUNT_TYPE_COUNTRY_WAR = 3;  // 国战次数
}
