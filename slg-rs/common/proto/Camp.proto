  }
}


// 城池征收
message CityLevyRq {
  required int32 cityId = 1;
  extend Base {
    optional CityLevyRq ext = 3069;
  }
}

message CityLevyRs {
  required int32 finishTime = 1;  // 本次生产完成时间
  optional ChangeInfo change_info = 2;
  extend Base {
    optional CityLevyRs ext = 3070;
  }
}


// 城池重建
