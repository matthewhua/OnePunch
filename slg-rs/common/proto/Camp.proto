  required int32 cityId = 1;
  extend Base {
    optional CityRebuildRq ext = 3071;
  }
}

message CityRebuildRs {
  optional int32 endTime = 1;     // 任期结束时间
  optional int32 curArm = 2;      // 城防当前兵力
  optional int32 total = 3;       // 城防总兵力上限
  optional string nick = 4;       // 城主名称
