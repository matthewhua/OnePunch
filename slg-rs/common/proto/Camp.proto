  optional string roleName = 2;
  extend Base {
    optional CampSearchRq ext = 3057;
  }
}

message CampSearchRs {
  optional CampPartyJob job = 1;
  extend Base {
    optional CampSearchRs ext = 3058;
  }
}


message SyncElectionStatusRs {
